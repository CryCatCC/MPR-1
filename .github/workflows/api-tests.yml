name: Python CI

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install flake8
          pip install pytest
          pip install fastapi
          pip install httpx
          pip install requests

      - name: Lint code
        run: |
          flake8 .

      - name: Run unit tests
        run: |
          pytest tests -v
